[build]
  command = "pnpm build"
  publish = "dist"

# Forçar rebuild limpo
[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"

# SPA fallback: redireciona tudo para index.html EXCETO arquivos estáticos
# O Netlify serve arquivos existentes automaticamente antes de aplicar redirects,
# então /sw.js, /manifest.json, /icons/* etc. já são servidos corretamente.
# O force = false garante que arquivos físicos tenham prioridade sobre o redirect.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Headers para o service worker — não deve ser cacheado
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Service-Worker-Allowed = "/"

# Headers para o manifest
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=0"

# Headers para ícones — cache de longa duração
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
